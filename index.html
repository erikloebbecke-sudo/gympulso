const app  = initializeApp(firebaseConfig);

// ── Firestore: save entire collection as one doc ─────────
async function saveToFirestore(userId, key, data) {
  await setDoc(doc(db, "users", userId, "data", key), { value: JSON.stringify(data) });
}
async function loadFromFirestore(userId, key) {
  const snap = await getDoc(doc(db, "users", userId, "data", key));
  if (snap.exists()) return JSON.parse(snap.data().value);

}

async function syncData() {

    saveToFirestore(state.user.uid, "exercises", state.exercises),
    saveToFirestore(state.user.uid, "workouts",  state.workouts),
    saveToFirestore(state.user.uid, "plans",     state.plans),
    saveToFirestore(state.user.uid, "gyms",      state.gyms),
  ]);
  state.syncing = false; render();
}

async function loadData() {
  const [exercises, workouts, plans, gyms] = await Promise.all([
    loadFromFirestore(state.user.uid, "exercises"),
    loadFromFirestore(state.user.uid, "workouts"),
    loadFromFirestore(state.user.uid, "plans"),
    loadFromFirestore(state.user.uid, "gyms"),
  ]);
  state.exercises = exercises || [];
  state.workouts  = workouts  || [];
  state.plans     = plans     || [];
  state.gyms      = gyms      || [];
}

// ── Auth listener ────────────────────────────────────────
onAuthStateChanged(auth, async (user) => {
  state.user = user;
  if (user) {
    state.loading = true; render();
    await loadData();
  }
  state.loading = false;
  render();
});

// ── Auth actions ─────────────────────────────────────────
async function doLogin() {
  state.authLoading = true; state.authError = ""; render();
  try {
    await signInWithEmailAndPassword(auth, state.authEmail, state.authPassword);
  } catch(e) {
    state.authError = authMsg(e.code);
    state.authLoading = false; render();
  }
}
async function doRegister() {
  state.authLoading = true; state.authError = ""; render();
  try {
    await createUserWithEmailAndPassword(auth, state.authEmail, state.authPassword);
  } catch(e) {
    state.authError = authMsg(e.code);
    state.authLoading = false; render();
  }
}
async function doLogout() {
  await signOut(auth);
  state.exercises = []; state.workouts = []; state.plans = []; state.gyms = [];
  state.tab = "workout"; state.activeWorkout = null;
  render();
}
function authMsg(code) {
  const map = {
    "auth/invalid-email":       "Ungültige E-Mail-Adresse.",
    "auth/user-not-found":      "Kein Account mit dieser E-Mail.",
    "auth/wrong-password":      "Falsches Passwort.",
    "auth/email-already-in-use":"Diese E-Mail ist bereits registriert.",
    "auth/weak-password":       "Passwort muss min. 6 Zeichen haben.",
    "auth/invalid-credential":  "E-Mail oder Passwort falsch.",
  };
  return map[code] || "Fehler: " + code;
}

// ── Data mutations ───────────────────────────────────────
function mut(fn) {
  fn();
  render();
  syncData();
}

// ── Export / Import ──────────────────────────────────────
function exportData() {
  const data = { exercises: state.exercises, workouts: state.workouts, plans: state.plans, gyms: state.gyms, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `workout-backup-${new Date().toISOString().slice(0,10)}.json`; a.click();
  URL.revokeObjectURL(url);
}
function importData(file) {
  const reader = new FileReader();
  reader.onload = async (ev) => {
    try {
      const d = JSON.parse(ev.target.result);
      mut(() => {
        if (d.exercises) state.exercises = d.exercises;
        if (d.workouts)  state.workouts  = d.workouts;
        if (d.plans)     state.plans     = d.plans;
        if (d.gyms)      state.gyms      = d.gyms;
      });
      alert("Import erfolgreich!");
    } catch { alert("Ungültige Datei."); }
  };
  reader.readAsText(file);
}

// ── Touch press effect ───────────────────────────────────
document.addEventListener("touchstart", e => { const b = e.target.closest("button"); if(b) b.classList.add("pressed"); }, { passive: true });
document.addEventListener("touchend",   e => { document.querySelectorAll(".pressed").forEach(el => el.classList.remove("pressed")); }, { passive: true });
document.addEventListener("touchcancel",e => { document.querySelectorAll(".pressed").forEach(el => el.classList.remove("pressed")); }, { passive: true });

// ── RENDER ───────────────────────────────────────────────
function render() {
  const root = document.getElementById("root");
  if (!root) return;

  if (state.loading) {
    root.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#000;color:#555;font-family:Helvetica Neue,sans-serif;font-size:14px;">Laden...</div>`;
    return;
  }

  if (!state.user) {
    root.innerHTML = renderAuth();
    bindAuth();
    return;
  }

  root.innerHTML = renderApp();
  bindApp();
}

function bindAuth() {
  document.getElementById("auth-email").oninput  = e => { state.authEmail    = e.target.value; };
  document.getElementById("auth-pw").oninput     = e => { state.authPassword = e.target.value; };
  document.getElementById("auth-email").onkeydown = e => { if(e.key === "Enter") document.getElementById("auth-pw").focus(); };
  document.getElementById("auth-pw").onkeydown   = e => { if(e.key === "Enter") state.authView === "login" ? doLogin() : doRegister(); };
  document.getElementById("auth-submit").onclick = () => state.authView === "login" ? doLogin() : doRegister();
  document.getElementById("auth-toggle").onclick = () => { state.authView = state.authView === "login" ? "register" : "login"; state.authError = ""; render(); };
}

function renderApp() {
  const tabs = [
    { id:"workout",  label:"TRAINING",   icon:iconDumbbell() },
    { id:"history",  label:"VERLAUF",    icon:iconHistory() },
    { id:"exercises",label:"ÜBUNGEN",    icon:iconList() },
    { id:"stats",    label:"STATISTIK",  icon:iconChart() },
    { id:"settings", label:"EINST.",     icon:iconSettings() },
  ];

  let content = "";
  if (state.tab === "workout")   content = renderWorkoutTab();
  if (state.tab === "history")   content = renderHistoryTab();
  if (state.tab === "exercises") content = renderExercisesTab();
  if (state.tab === "stats")     content = renderStatsTab();
  if (state.tab === "settings")  content = renderSettingsTab();

  const modal = state.modal ? renderModal() : "";

  return `

// ── WORKOUT TAB ──────────────────────────────────────────
function renderWorkoutTab() {
  if (state.activeWorkout) {
    const w = state.activeWorkout;
    const exBlocks = w.exercises.map((ex, exIdx) => {
      const exData = state.exercises.find(e => e.id === ex.exerciseId);
      const sets = ex.sets.map((s, sIdx) => `
        <div class="set-row">
          <div class="set-num">${sIdx+1}</div>
          <input class="set-input" type="number" inputmode="decimal" placeholder="0" value="${s.weight}" data-ex="${exIdx}" data-s="${sIdx}" data-field="weight">
          <input class="set-input" type="number" inputmode="numeric" placeholder="0" value="${s.reps}"   data-ex="${exIdx}" data-s="${sIdx}" data-field="reps">
          <button class="btn btn-icon remove-set" data-ex="${exIdx}" data-s="${sIdx}">${iconX()}</button>
        </div>`).join("");
      return `
        <div class="exercise-block">
          <div class="exercise-block-header">
            <div>
              <div style="font-weight:700;font-size:15px;">${exData?.name||"?"}</div>
              ${exData?.category ? `<span class="tag" style="margin-top:4px;display:inline-block">${exData.category}</span>` : ""}
            </div>
            <button class="btn btn-icon remove-exercise" data-ex="${exIdx}">${iconTrash()}</button>
          </div>
          <div class="exercise-block-body">
            <div class="set-labels"><div class="set-label">#</div><div class="set-label">KG</div><div class="set-label">WDHL</div><div class="set-label"></div></div>
            ${sets}
            <button class="btn btn-ghost btn-sm add-set" data-ex="${exIdx}" style="margin-top:4px">${iconPlus()} Satz</button>
          </div>
        </div>`;
    }).join("");

    return `
      <div class="header">
        <div style="flex:1">
          <div class="header-title">Aktives Training</div>
          <div style="display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap;">
            <input type="date" id="workout-date" value="${w.date.slice(0,10)}" style="width:auto;flex:0 0 auto;padding:5px 8px;font-size:12px;">
            ${w.gym ? `<span style="font-size:12px;color:#555">${iconLocation()} ${w.gym}</span>` : ""}
          </div>
        </div>
        <button id="finish-workout" class="btn btn-primary btn-sm" style="flex-shrink:0;align-self:flex-start;width:auto">${iconCheck()} Fertig</button>
      </div>
      <div class="page-content">
        ${exBlocks}
        <button id="add-exercise" class="btn btn-ghost">${iconPlus()} Übung hinzufügen</button>
      </div>`;
  }

  const planItems = state.plans.map(p => `
    <div class="plan-item">
      <div>
        <div style="font-weight:700;font-size:15px">${p.name}</div>
        <div class="list-item-sub">${p.exercises.length} Übungen</div>
      </div>
      <button class="btn btn-primary btn-sm start-plan" data-id="${p.id}" style="width:auto">${iconPlay()}</button>
    </div>`).join("");

  return `
    <div class="header"><div class="header-title">Training</div></div>
    <div class="page-content">
      <div class="section-label">Starten</div>
      <button id="start-free" class="btn btn-primary">${iconPlay()} Freies Training</button>
      <button id="start-plan-pick" class="btn btn-ghost">${iconList()} Aus Vorlage starten</button>
      ${state.plans.length ? `<div class="section-label">Vorlagen</div>${planItems}` : ""}
    </div>`;
}

// ── HISTORY TAB ──────────────────────────────────────────
function renderHistoryTab() {
  const items = state.workouts.map(w => {
    const exNames = w.exercises.map(e => state.exercises.find(ex=>ex.id===e.exerciseId)?.name||"?");
    const totalSets = w.exercises.reduce((a,e)=>a+e.sets.length,0);
    return `
      <div class="workout-item open-workout" data-id="${w.id}">
        <div class="workout-item-date">${fmt(w.date)}${w.gym?` · <span style="color:#555">${w.gym}</span>`:""}</div>
        <div class="workout-item-title">${exNames.slice(0,2).join(", ")}${exNames.length>2?` +${exNames.length-2}`:""}</div>
        <div class="workout-exercises">${w.exercises.length} Übungen · ${totalSets} Sätze</div>
      </div>`;
  }).join("");

  return `
    <div class="header"><div class="header-title">Verlauf</div></div>
    <div class="page-content">
      ${state.workouts.length === 0
        ? `<div class="empty"><div class="empty-text">Noch kein Training</div><div class="empty-sub">Starte dein erstes Training!</div></div>`
        : items}
    </div>`;
}

// ── EXERCISES TAB ─────────────────────────────────────────
function renderExercisesTab() {
  const sub = state._exSubTab || "exercises";
  const exList = state.exercises.map(ex => `
    <div class="list-item">
      <div>
        <div class="list-item-title">${ex.name}</div>
        ${ex.category?`<span class="tag" style="margin-top:4px;display:inline-block">${ex.category}</span>`:""}
      </div>
      <div style="display:flex;gap:4px">
        <button class="btn btn-icon edit-ex" data-id="${ex.id}">${iconEdit()}</button>
        <button class="btn btn-icon del-ex" data-id="${ex.id}">${iconTrash()}</button>
      </div>
    </div>`).join("");

  const planList = state.plans.map(p => `
    <div class="list-item">
      <div>
        <div class="list-item-title">${p.name}</div>
        <div class="list-item-sub">${p.exercises.length} Übungen</div>
      </div>
      <button class="btn btn-icon del-plan" data-id="${p.id}">${iconTrash()}</button>
    </div>`).join("");

  return `
    <div class="header"><div class="header-title">Übungen</div></div>
    <div class="page-content">
      <div class="chip-scroll">
        <span class="chip${sub==="exercises"?" active":""}" data-extab="exercises">Übungen</span>
        <span class="chip${sub==="plans"?" active":""}" data-extab="plans">Vorlagen</span>
      </div>
      ${sub==="exercises" ? `
        <button id="new-ex" class="btn btn-primary">${iconPlus()} Neue Übung</button>
        ${state.exercises.length===0
          ? `<div class="empty"><div class="empty-text">Noch keine Übungen</div><div class="empty-sub">Erstelle deine erste Übung</div></div>`
          : exList}
      ` : `
        <button id="new-plan" class="btn btn-primary">${iconPlus()} Neue Vorlage</button>
        ${state.plans.length===0
          ? `<div class="empty"><div class="empty-text">Noch keine Vorlagen</div><div class="empty-sub">z.B. Push Day / Pull Day</div></div>`
          : planList}
      `}
    </div>`;
}

// ── STATS TAB ─────────────────────────────────────────────
function renderStatsTab() {
  const selectedEx = state._statsEx || "";
  const setNum     = state._statsSet || 1;

  const exWithData = state.exercises.filter(ex =>
    state.workouts.some(w => w.exercises.some(e => e.exerciseId===ex.id)));

  const opts = exWithData.map(ex =>
    `<option value="${ex.id}" ${ex.id===selectedEx?"selected":""}>${ex.name}</option>`).join("");

  let maxSets = 1;
  if (selectedEx) {
    maxSets = Math.max(...state.workouts.flatMap(w =>
      w.exercises.filter(e=>e.exerciseId===selectedEx).map(e=>e.sets.length)), 1);
  }
  const setChips = Array.from({length:maxSets},(_,i)=>i+1).map(n=>
    `<span class="chip${setNum===n?" active":""}" data-statsset="${n}">Satz ${n}</span>`).join("");

  const chartData = (() => {
    if (!selectedEx) return [];
    return state.workouts
      .filter(w => w.exercises.some(e=>e.exerciseId===selectedEx))
      .map(w => {
        const ex = w.exercises.find(e=>e.exerciseId===selectedEx);
        const s  = ex?.sets[setNum-1];
        if (!s || (!s.weight && !s.reps)) return null;
        return { date: fmt(w.date), kg: parseFloat(s.weight)||0, reps: parseFloat(s.reps)||0 };
      }).filter(Boolean).reverse();
  })();

  // Build SVG chart inline
  const chart = chartData.length >= 1 ? buildChart(chartData) : "";

  return `
    <div class="header"><div class="header-title">Statistik</div></div>
    <div class="page-content">
      <div class="section-label">Übung</div>
      <select id="stats-ex"><option value="">-- Übung wählen --</option>${opts}</select>
      ${selectedEx ? `<div class="section-label">Satz</div><div class="chip-scroll">${setChips}</div>` : ""}
      ${chartData.length>0 ? `<div class="chart-wrap">${chart}</div>` :
        selectedEx
          ? `<div class="empty"><div class="empty-text">Keine Daten</div><div class="empty-sub">Noch kein Training mit dieser Übung</div></div>`
          : `<div class="empty"><div class="empty-text">Übung auswählen</div><div class="empty-sub">Wähle eine Übung um die Entwicklung zu sehen</div></div>`
      }
    </div>`;
}

function buildChart(data) {
  const W = 320, H = 180, PAD = { t:16, r:40, b:32, l:36 };
  const maxKg   = Math.max(...data.map(d=>d.kg),   1);
  const maxReps = Math.max(...data.map(d=>d.reps),  1);
  const n = data.length;
  const xPos = i => PAD.l + (n===1 ? (W-PAD.l-PAD.r)/2 : i*(W-PAD.l-PAD.r)/(n-1));
  const yKg   = v => PAD.t + (1 - v/maxKg)   * (H-PAD.t-PAD.b);
  const yReps = v => PAD.t + (1 - v/maxReps) * (H-PAD.t-PAD.b);

  const lineKg   = data.map((d,i)=>`${i===0?"M":"L"}${xPos(i).toFixed(1)},${yKg(d.kg).toFixed(1)}`).join(" ");
  const lineReps = data.map((d,i)=>`${i===0?"M":"L"}${xPos(i).toFixed(1)},${yReps(d.reps).toFixed(1)}`).join(" ");

  const dotsKg   = data.map((d,i)=>`<circle cx="${xPos(i).toFixed(1)}" cy="${yKg(d.kg).toFixed(1)}"   r="3" fill="#4fc3f7"/>`).join("");
  const dotsReps = data.map((d,i)=>`<circle cx="${xPos(i).toFixed(1)}" cy="${yReps(d.reps).toFixed(1)}" r="3" fill="#81c784"/>`).join("");

  const labels = data.map((d,i)=>
    `<text x="${xPos(i).toFixed(1)}" y="${H-4}" text-anchor="middle" font-size="9" fill="#555">${d.date}</text>`).join("");

  // Y axis labels
  const yLabelsKg = [0, Math.round(maxKg/2), maxKg].map(v =>
    `<text x="${PAD.l-4}" y="${yKg(v).toFixed(1)}" text-anchor="end" dominant-baseline="middle" font-size="9" fill="#4fc3f7">${v}</text>`).join("");
  const yLabelsReps = [0, Math.round(maxReps/2), maxReps].map(v =>
    `<text x="${W-PAD.r+4}" y="${yReps(v).toFixed(1)}" dominant-baseline="middle" font-size="9" fill="#81c784">${v}</text>`).join("");

  return `
    <div style="display:flex;justify-content:space-between;margin-bottom:8px">
      <span style="font-size:11px;font-weight:600;color:#4fc3f7;letter-spacing:0.06em">KG</span>
      <span style="font-size:11px;font-weight:600;color:#81c784;letter-spacing:0.06em">WDHL</span>
    </div>
    <svg viewBox="0 0 ${W} ${H}" width="100%" style="overflow:visible">
      <line x1="${PAD.l}" y1="${PAD.t}" x2="${PAD.l}" y2="${H-PAD.b}" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
      <line x1="${PAD.l}" y1="${H-PAD.b}" x2="${W-PAD.r}" y2="${H-PAD.b}" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
      ${yLabelsKg}${yLabelsReps}${labels}
      <path d="${lineKg}"   fill="none" stroke="#4fc3f7" stroke-width="2"/>
      <path d="${lineReps}" fill="none" stroke="#81c784" stroke-width="2"/>
      ${dotsKg}${dotsReps}
    </svg>`;
}

    const items = filtered.map(ex => `
      <div class="list-item pick-ex" data-id="${ex.id}" style="cursor:pointer">
        <div><div class="list-item-title">${ex.name}</div>${ex.category?`<span class="tag">${ex.category}</span>`:""}</div>
        ${iconPlus()}

    inner = `
      <div class="modal-title">Übung hinzufügen</div>
      <div class="form-group"><input id="ex-search" value="${q}" placeholder="Übung suchen..."></div>
      <div class="chip-scroll" style="margin-bottom:12px">${chips}</div>

      <div class="form-group"><div class="form-label">Kategorie</div><input id="ex-cat-inp" value="${ex.category||""}" placeholder="z.B. Brust, Rücken..."></div>

      <div class="list-item plan-toggle" data-id="${ex.id}" style="cursor:pointer">

      const exData = state.exercises.find(e=>e.id===ex.exerciseId);
      const sets = ex.sets.map((s,j) =>

      ).join("");
      return `<div style="margin-bottom:14px"><div style="font-weight:700;margin-bottom:6px">${exData?.name||"?"}</div>${sets}</div>`;

  if (m === "edit-workout") {
    const draft = d.draft;
    const exBlocks = draft.exercises.map((ex, exIdx) => {
      const exData = state.exercises.find(e=>e.id===ex.exerciseId);
      const sets = ex.sets.map((s, sIdx) => `
        <div class="set-row">
          <div class="set-num">${sIdx+1}</div>

          <button class="btn btn-icon draft-rm-set" data-ex="${exIdx}" data-s="${sIdx}">${iconX()}</button>

      <div style="display:flex;gap:1px;margin-top:var(--s4)">
        <button id="cancel-edit-workout" class="btn btn-ghost" style="flex:1">Abbrechen</button>
        <button id="save-edit-workout"   class="btn btn-primary" style="flex:1">${iconCheck()} Speichern</button>
      </div>`;
  }

  return `
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal">${inner}</div>
    </div>`;
}

// ── BIND EVENTS ───────────────────────────────────────────
function bindApp() {
  // Nav
  document.querySelectorAll(".nav-btn[data-tab]").forEach(b =>
    b.addEventListener("click", () => { state.tab = b.dataset.tab; render(); }));

  // Modal overlay close
  const ov = document.getElementById("modal-overlay");
  if (ov) ov.addEventListener("click", e => { if(e.target===ov){ state.modal=null; state.modalData={}; render(); }});

  // ── Workout tab ──
  const startFree = document.getElementById("start-free");
  if (startFree) startFree.onclick = () => { state.modalData = { gymName:"", detecting:false, geoName:"" }; state.modal="gym"; render(); };

  const startPlanPick = document.getElementById("start-plan-pick");
  if (startPlanPick) startPlanPick.onclick = () => { state.modal="pick-plan"; render(); };

  document.querySelectorAll(".start-plan").forEach(b =>
    b.addEventListener("click", () => {
      const plan = state.plans.find(p=>p.id===b.dataset.id);
      if (!plan) return;
      state.activeWorkout = { id:uid(), date:new Date().toISOString(), gym:null,
        exercises: plan.exercises.map(exId=>({ exerciseId:exId, sets:[{id:uid(),reps:"",weight:""}] })) };
      render();
    }));

  // Active workout
  const finishBtn = document.getElementById("finish-workout");
  if (finishBtn) finishBtn.onclick = () => {
    mut(() => { state.workouts.unshift({...state.activeWorkout}); state.activeWorkout=null; });
  };

  const wdInput = document.getElementById("workout-date");
  if (wdInput) wdInput.onchange = e => { state.activeWorkout.date = new Date(e.target.value).toISOString(); render(); };

  document.querySelectorAll(".set-input").forEach(inp =>
    inp.addEventListener("input", e => {
      const {ex,s,field} = e.target.dataset;
      state.activeWorkout.exercises[+ex].sets[+s][field] = e.target.value;
    }));

  document.querySelectorAll(".remove-set").forEach(b =>
    b.addEventListener("click", () => {
      const {ex,s} = b.dataset;
      state.activeWorkout.exercises[+ex].sets.splice(+s,1);
      render();
    }));

  document.querySelectorAll(".add-set").forEach(b =>
    b.addEventListener("click", () => {
      state.activeWorkout.exercises[+b.dataset.ex].sets.push({id:uid(),reps:"",weight:""});
      render();
    }));

  document.querySelectorAll(".remove-exercise").forEach(b =>
    b.addEventListener("click", () => {
      state.activeWorkout.exercises.splice(+b.dataset.ex,1);
      render();
    }));

  const addExBtn = document.getElementById("add-exercise");
  if (addExBtn) addExBtn.onclick = () => { state.modal="pick-exercise"; state.modalData={cat:"Alle",q:""}; render(); };

  // ── History ──
  document.querySelectorAll(".open-workout").forEach(el =>
    el.addEventListener("click", () => { state.modal="workout-detail"; state.modalData={id:el.dataset.id}; render(); }));

  // ── Exercises ──
  document.querySelectorAll(".chip[data-extab]").forEach(c =>
    c.addEventListener("click", () => { state._exSubTab=c.dataset.extab; render(); }));

  const newEx = document.getElementById("new-ex");
  if (newEx) newEx.onclick = () => { state.modal="new-ex"; state.modalData={ex:{name:"",category:""}}; render(); };

  document.querySelectorAll(".edit-ex").forEach(b =>
    b.addEventListener("click", () => {
      const ex = state.exercises.find(e=>e.id===b.dataset.id);
      state.modal="edit-ex"; state.modalData={ex:{...ex}}; render();
    }));

  document.querySelectorAll(".del-ex").forEach(b =>
    b.addEventListener("click", () => { mut(() => state.exercises = state.exercises.filter(e=>e.id!==b.dataset.id)); }));

  const newPlan = document.getElementById("new-plan");
  if (newPlan) newPlan.onclick = () => { state.modal="new-plan"; state.modalData={name:"",selected:[]}; render(); };

  document.querySelectorAll(".del-plan").forEach(b =>
    b.addEventListener("click", () => { mut(() => state.plans = state.plans.filter(p=>p.id!==b.dataset.id)); }));

  // ── Stats ──
  const statsEx = document.getElementById("stats-ex");
  if (statsEx) statsEx.onchange = e => { state._statsEx=e.target.value; state._statsSet=1; render(); };

  document.querySelectorAll(".chip[data-statsset]").forEach(c =>
    c.addEventListener("click", () => { state._statsSet=+c.dataset.statsset; render(); }));

  // ── Settings ──
  const logoutBtn = document.getElementById("logout-btn");
  if (logoutBtn) logoutBtn.onclick = doLogout;

  const exportBtn = document.getElementById("export-btn");
  if (exportBtn) exportBtn.onclick = exportData;

  const importInp = document.getElementById("import-input");
  if (importInp) importInp.onchange = e => { if(e.target.files[0]) importData(e.target.files[0]); };

  document.querySelectorAll(".del-gym").forEach(b =>
    b.addEventListener("click", () => { mut(() => state.gyms = state.gyms.filter(g=>g.id!==b.dataset.id)); }));

  // ── Gym modal ──
  const gymNameInp = document.getElementById("gym-name");
  if (gymNameInp) {
    gymNameInp.oninput = e => { state.modalData.gymName = e.target.value; };
    gymNameInp.focus?.();
  }

  const detectBtn = document.getElementById("detect-gym");
  if (detectBtn) detectBtn.onclick = () => {
    state.modalData.detecting = true; render();
    navigator.geolocation?.getCurrentPosition(async pos => {
      try {
        const {latitude:lat,longitude:lon} = pos.coords;
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
        const data = await res.json();
        const s = data.address?.leisure||data.address?.amenity||data.address?.road||data.display_name?.split(",")[0]||"Mein Gym";
        state.modalData.geoName = s; state.modalData.gymName = s;
      } catch { state.modalData.geoName = "Standort nicht verfügbar"; }
      state.modalData.detecting = false; render();
    }, () => { state.modalData.geoName="Kein Zugriff"; state.modalData.detecting=false; render(); });
  };

  document.querySelectorAll(".pick-fav").forEach(c =>
    c.addEventListener("click", () => { state.modalData.gymName=c.dataset.name; render(); }));

  const saveGymFav = document.getElementById("save-gym-fav");
  if (saveGymFav) saveGymFav.onclick = () => {
    const name = document.getElementById("gym-name")?.value.trim() || state.modalData.gymName?.trim();
    if (!name) return;
    if (!state.gyms.find(g=>g.name===name)) mut(() => state.gyms.push({id:uid(),name}));
    else render();
  };

  const startWorkoutGym = document.getElementById("start-workout-gym");
  if (startWorkoutGym) startWorkoutGym.onclick = () => {
    const name = document.getElementById("gym-name")?.value.trim() || state.modalData.gymName?.trim() || null;
    state.activeWorkout = { id:uid(), date:new Date().toISOString(), gym:name, exercises:[] };
    state.modal=null; state.modalData={}; render();
  };

  // ── Plan picker modal ──
  document.querySelectorAll(".use-plan").forEach(b =>
    b.addEventListener("click", () => {
      const plan = state.plans.find(p=>p.id===b.dataset.id);
      if (!plan) return;
      state.activeWorkout = { id:uid(), date:new Date().toISOString(), gym:null,
        exercises: plan.exercises.map(exId=>({ exerciseId:exId, sets:[{id:uid(),reps:"",weight:""}] })) };
      state.modal=null; state.modalData={}; render();
    }));

  // ── Pick exercise modal ──
  const exSearch = document.getElementById("ex-search");
  if (exSearch) exSearch.oninput = e => { state.modalData.q=e.target.value; render(); };

  document.querySelectorAll(".chip.ex-cat").forEach(c =>
    c.addEventListener("click", () => { state.modalData.cat=c.dataset.cat; render(); }));

  document.querySelectorAll(".pick-ex").forEach(el =>
    el.addEventListener("click", () => {
      state.activeWorkout?.exercises.push({ exerciseId:el.dataset.id, sets:[{id:uid(),reps:"",weight:""}] });
      state.modal=null; state.modalData={}; render();
    }));

  // ── New/edit exercise modal ──
  const saveEx = document.getElementById("save-ex");
  if (saveEx) saveEx.onclick = () => {
    const name = document.getElementById("ex-name")?.value.trim();
    const cat  = document.getElementById("ex-cat-inp")?.value.trim();
    if (!name) return;
    if (state.modal==="edit-ex") {
      mut(() => state.exercises = state.exercises.map(e=>e.id===state.modalData.ex.id ? {...e,name,category:cat} : e));
    } else {
      mut(() => state.exercises.push({id:uid(),name,category:cat}));
    }
    state.modal=null; state.modalData={}; render();
  };

  // ── New plan modal ──
  const planNameInp = document.getElementById("plan-name");
  if (planNameInp) planNameInp.oninput = e => { state.modalData.name=e.target.value; };

  document.querySelectorAll(".plan-toggle").forEach(el =>
    el.addEventListener("click", () => {
      const sel = state.modalData.selected||[];
      state.modalData.selected = sel.includes(el.dataset.id)
        ? sel.filter(x=>x!==el.dataset.id) : [...sel,el.dataset.id];
      render();
    }));

  const savePlan = document.getElementById("save-plan");
  if (savePlan) savePlan.onclick = () => {
    const name = document.getElementById("plan-name")?.value.trim() || state.modalData.name?.trim();
    const sel  = state.modalData.selected||[];
    if (!name||!sel.length) return;
    mut(() => state.plans.push({id:uid(),name,exercises:sel}));
    state.modal=null; state.modalData={}; render();
  };

  // ── Workout detail modal ──
  const editWBtn = document.getElementById("edit-workout-btn");
  if (editWBtn) editWBtn.onclick = () => {
    const w = state.workouts.find(x=>x.id===state.modalData.id);
    state.modal="edit-workout"; state.modalData={draft:JSON.parse(JSON.stringify(w))}; render();
  };

  const delWBtn = document.getElementById("del-workout-btn");
  if (delWBtn) delWBtn.onclick = () => {
    const id = state.modalData.id;
    mut(() => state.workouts = state.workouts.filter(w=>w.id!==id));
    state.modal=null; state.modalData={}; render();
  };

  // ── Edit workout modal ──
  document.querySelectorAll(".draft-set").forEach(inp =>
    inp.addEventListener("input", e => {
      const {ex,s,field} = e.target.dataset;
      state.modalData.draft.exercises[+ex].sets[+s][field] = e.target.value;
    }));

  document.querySelectorAll(".draft-rm-set").forEach(b =>
    b.addEventListener("click", () => {
      state.modalData.draft.exercises[+b.dataset.ex].sets.splice(+b.dataset.s,1); render();
    }));

  document.querySelectorAll(".draft-add-set").forEach(b =>
    b.addEventListener("click", () => {
      state.modalData.draft.exercises[+b.dataset.ex].sets.push({id:uid(),reps:"",weight:""}); render();
    }));

  const draftDate = document.getElementById("draft-date");
  if (draftDate) draftDate.onchange = e => { state.modalData.draft.date=new Date(e.target.value).toISOString(); render(); };

  const draftGym = document.getElementById("draft-gym");
  if (draftGym) draftGym.oninput = e => { state.modalData.draft.gym=e.target.value; };

  const cancelEditW = document.getElementById("cancel-edit-workout");
  if (cancelEditW) cancelEditW.onclick = () => {
    state.modal="workout-detail"; state.modalData={id:state.modalData.draft.id}; render();
  };

  const saveEditW = document.getElementById("save-edit-workout");
  if (saveEditW) saveEditW.onclick = () => {
    const draft = {
      ...state.modalData.draft,
      date: document.getElementById("draft-date")?.value ? new Date(document.getElementById("draft-date").value).toISOString() : state.modalData.draft.date,
      gym:  document.getElementById("draft-gym")?.value ?? state.modalData.draft.gym,
    };
    mut(() => state.workouts = state.workouts.map(w=>w.id===draft.id?draft:w));
    state.modal="workout-detail"; state.modalData={id:draft.id}; render();
  };
}

<style>
:root {
  --bg:#000;--surface:#0f0f0f;--surface2:#1a1a1a;--surface3:#242424;
  --text:#fff;--text2:#aaa;--muted:#555;--radius:3px;
  --sans:'Helvetica Neue',Helvetica,Arial,sans-serif;
  --s1:4px;--s2:8px;--s3:12px;--s4:16px;--s5:20px;--s6:24px;--s7:32px;--s8:48px;
  --gutter:20px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#000!important;min-height:100vh;-webkit-font-smoothing:antialiased}
body{color:var(--text);font-family:var(--sans)}
button{cursor:pointer;border:none;background:none;font-family:var(--sans)}
input,select,textarea{font-family:var(--sans);background:var(--surface2);border:none;color:var(--text);border-radius:var(--radius);padding:var(--s3) var(--s4);font-size:15px;outline:none;width:100%;display:block}
input:focus,select:focus{background:var(--surface3)}
select option{background:#111}

.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:#000}
.tab-root{width:100%;display:flex;flex-direction:column;flex:1}
.page-content{flex:1;overflow-y:auto;padding:var(--s2) 0 100px}

.nav{display:flex;background:rgba(0,0,0,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:var(--s2) 0 var(--s4);position:sticky;bottom:0;z-index:100;width:100%}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:var(--s1);padding:var(--s2);color:var(--muted);font-size:10px;letter-spacing:.06em;text-transform:uppercase;transition:color .15s}
.nav-btn.active{color:var(--text)}
.nav-btn svg{width:20px;height:20px}
.btn svg{width:1em;height:1em;flex-shrink:0}
.btn-icon svg{width:1.1em;height:1.1em}

.header{padding:var(--s3) var(--gutter) var(--s4);display:flex;align-items:flex-start;justify-content:space-between;width:100%;gap:var(--s4)}
.header-title{font-size:22px;font-weight:800;letter-spacing:-.04em;line-height:1.1}

.section-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:var(--s5) var(--gutter) var(--s2)}

.btn{display:flex;align-items:center;justify-content:center;gap:var(--s2);padding:var(--s4) var(--gutter);border-radius:var(--radius);font-size:15px;font-weight:600;letter-spacing:-.01em;transition:background .1s,box-shadow .1s;border:none;width:100%}
.btn-primary{background:var(--surface2);color:#fff}
.btn-primary:hover{background:var(--surface3)}
.btn-primary:active,.btn-primary.pressed{background:#0a0a0a;box-shadow:inset 0 -10px 20px rgba(140,10,10,.4)}
.btn-ghost{background:var(--surface2);color:#fff}
.btn-ghost:hover{background:var(--surface3)}
.btn-ghost:active,.btn-ghost.pressed{background:#0a0a0a;box-shadow:inset 0 -10px 20px rgba(140,10,10,.4)}
.btn-danger{background:var(--surface2);color:#fff}
.btn-danger:active,.btn-danger.pressed{background:#0a0a0a;box-shadow:inset 0 -10px 20px rgba(140,10,10,.5)}
.btn-sm{padding:var(--s3) var(--s4);font-size:13px}
.btn-icon{width:36px;height:36px;flex:none;padding:0;border-radius:var(--radius);background:transparent}
.btn-icon:active,.btn-icon.pressed{box-shadow:inset 0 -6px 12px rgba(140,10,10,.35)}

.tag{display:inline-block;padding:var(--s1) var(--s3);border-radius:var(--radius);font-size:11px;background:var(--surface2);color:var(--muted);letter-spacing:.04em}

.list-item{display:flex;align-items:center;justify-content:space-between;padding:var(--s4) var(--gutter);background:var(--surface);margin-bottom:1px;width:100%;min-height:56px}
.list-item-title{font-weight:600;font-size:15px;line-height:1.3}
.list-item-sub{font-size:12px;color:var(--muted);margin-top:var(--s1)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .15s}
.modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:var(--s6) var(--gutter) var(--s8);animation:slideUp .22s cubic-bezier(.25,.46,.45,.94)}
.modal-title{font-size:20px;font-weight:800;letter-spacing:-.03em;margin-bottom:var(--s5)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}

.form-group{margin-bottom:var(--s4)}
.form-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:var(--s2);display:block;font-weight:600}

.exercise-block{background:var(--surface);margin-bottom:1px;overflow:hidden}
.exercise-block-header{padding:var(--s4) var(--gutter);display:flex;align-items:center;justify-content:space-between;background:var(--surface2);min-height:52px}
.exercise-block-body{padding:var(--s4) var(--gutter) var(--s5)}
.set-labels{display:grid;grid-template-columns:28px 1fr 1fr 36px;gap:var(--s2);margin-bottom:var(--s2)}
.set-label{font-size:10px;color:var(--muted);text-align:center;letter-spacing:.08em;text-transform:uppercase}
.set-row{display:grid;grid-template-columns:28px 1fr 1fr 36px;gap:var(--s2);align-items:center;margin-bottom:var(--s2)}
.set-num{font-size:12px;color:var(--muted);text-align:center}
.set-input{background:var(--surface2);border:none;border-radius:var(--radius);padding:var(--s3);font-size:15px;color:var(--text);text-align:center;width:100%;outline:none;font-family:var(--sans)}
.set-input:focus{background:var(--surface3)}

.workout-item{background:var(--surface);padding:var(--s4) var(--gutter);margin-bottom:1px;width:100%;cursor:pointer}
.workout-item:active{background:var(--surface2)}
.workout-item-date{font-size:11px;color:var(--muted);letter-spacing:.04em;margin-bottom:var(--s1)}
.workout-item-title{font-size:16px;font-weight:700;margin-bottom:var(--s1);letter-spacing:-.02em}
.workout-exercises{font-size:12px;color:var(--muted)}

.plan-item{background:var(--surface);padding:var(--s4) var(--gutter);margin-bottom:1px;display:flex;align-items:center;justify-content:space-between;width:100%;min-height:56px}

.chip-scroll{display:flex;gap:1px;width:100%;margin-bottom:1px}
.chip{padding:var(--s4) 0;border-radius:var(--radius);font-size:13px;font-weight:500;background:var(--surface2);color:var(--muted);cursor:pointer;transition:background .1s,color .1s;border:none;flex:1;text-align:center}
.chip.active{background:var(--text);color:#000;font-weight:600}

.gym-badge{display:inline-flex;align-items:center;gap:var(--s1);font-size:12px;color:var(--text2);background:var(--surface2);border-radius:var(--radius);padding:var(--s1) var(--s3)}
.chart-wrap{background:var(--surface);padding:var(--gutter);margin-bottom:1px;width:100%}
.empty{text-align:center;padding:var(--s8) var(--gutter)}
.empty-text{font-size:16px;font-weight:700;margin-bottom:var(--s2);color:var(--text);letter-spacing:-.02em}
.empty-sub{font-size:13px;color:var(--muted);line-height:1.5}
.flex-row{display:flex;gap:var(--s2);align-items:center}
.text-muted{color:var(--muted);font-size:12px}
</style>
</head>
